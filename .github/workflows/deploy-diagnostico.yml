name: Build & Deploy — Diagnóstico Service

on:
  push:
    branches:
      - master
    paths:
      - 'diagnostico-service/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: ./diagnostico-service
          push: true
          tags: ghcr.io/edylawson/diagnostico-service:latest

      - name: Notificar Coolify para redeploy
        run: |
          curl -s -X GET \
            "http://195.200.7.184:8000/api/v1/deploy?uuid=${{ secrets.COOLIFY_DIAGNOSTICO_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
